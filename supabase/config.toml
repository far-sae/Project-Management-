# Edge Functions: allow invocation without strict JWT verification (fixes 401 on checkout/cancel)
# See: https://supabase.com/docs/guides/functions/function-configuration

[functions.create-checkout-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# Cancel-now validates JWT inside the function; disable gateway JWT so we return clear 401 body
[functions.cancel-subscription-now]
verify_jwt = false

[functions.create-checkout-extra-seat]
verify_jwt = false

[functions.remove-member]
verify_jwt = false

# AI proxy - invoked from browser; JWT not reliably passed in some deployments
[functions.ai-chat]
verify_jwt = false

# Admin-only; validates JWT inside function (verify_jwt=false so OPTIONS preflight passes CORS)
[functions.public-stats]
verify_jwt = false
